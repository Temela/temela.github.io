# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------
title: "Anthony NDUKA"
first_name: "Anthony"
middle_name: ""
last_name: "NDUKA (Rev. Fr.)"
contact_note: >
  You can even add a little note about which of these is the best way to reach you.
description: >
  Catholic priest and data scientist specializing in AI, Human-Centered Computing, Ethical AI and Healthcare Tech research.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: "data science, AI research, quantum computing, IoT analytics"
lang: "en"
icon: "⚛️"

url: "https://temela.github.io"
baseurl: ""
last_updated: false
impressum_path: ""
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
repo_theme_light: "default"
repo_theme_dark: "dark"
repo_trophies:
  enabled: false

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true
max_width: "930px"

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------
serve_og_meta: true
serve_schema_org: true
og_image: "/assets/img/social-preview.jpg"

# -----------------------------------------------------------------------------
# Analytics
# -----------------------------------------------------------------------------
google_analytics: ""
cronitor_analytics: ""
pirsch_analytics: ""
openpanel_analytics: ""
google_site_verification: ""
bing_site_verification: ""

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  books:
    output: true
    permalink: /books/:name/
  news:
    output: true
    permalink: /news/:name/
  projects:
    output: true
    permalink: /projects/:name/

# -----------------------------------------------------------------------------
# Jekyll Settings
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages", "_scripts"]
exclude:
  - bin/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - package*.json
  - docker-compose*
  - README.md
  - LICENSE
  - _news/announcement_*.md
  - _pages/blog.md
  - _posts/
  - assets/jupyter/blog.ipynb

keep_files:
  - CNAME
  - .nojekyll

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - jekyll-archives
  - jekyll-scholar
  - jekyll-paginate-v2
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------
scholar:
  last_name: [Nduka]
  first_name: [Anthony, C.]
  localization: en_US
  style: apa
  source: ./_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  details_dir: bibliography
  details_link: Details
  query: "@*"
  group_by: year
  group_order: descending
  replace_strings: true
  join_strings: true

enable_publication_badges:
  altmetric: false
  dimensions: false
  google_scholar: true

max_author_limit: 3
more_authors_animation_delay: 10
enable_publication_thumbnails: true

# -----------------------------------------------------------------------------
# Image Handling
# -----------------------------------------------------------------------------
imagemagick:
  enabled: true
  widths: [400, 800, 1200]
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".png"
  output_formats:
    webp: "-quality 85"

lazy_loading_images: true

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------
enable_math: true
enable_darkmode: true
enable_masonry: true
enable_project_categories: true
enable_medium_zoom: true

# -----------------------------------------------------------------------------
# External Data
# -----------------------------------------------------------------------------
jekyll_get_json:
  - data: resume
    json: assets/json/resume.json
